<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="800" height="200">
  <defs>
    <filter id="glow-0" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="5" result="blur" />
      <feFlood flood-color="#06B6D4" flood-opacity="0.35" result="color" />
      <feComposite in="color" in2="blur" operator="in" result="glow" />
      <feMerge>
        <feMergeNode in="glow" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="breathe-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="blur" />
      <feFlood flood-color="#06B6D4" flood-opacity="0.25" result="color" />
      <feComposite in="color" in2="blur" operator="in" result="glow" />
      <feMerge>
        <feMergeNode in="glow" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.6s" begin="0s" fill="freeze" />
    <text x="400" y="72" text-anchor="middle" fill="#E0E0E0" font-family="Inter, system-ui, sans-serif" font-size="32" font-weight="700" filter="url(#glow-0)">Instagram Scrapper</text>
  </g>
  <line x1="340" y1="96" x2="460" y2="96" stroke="#06B6D4" stroke-width="2" stroke-linecap="round" opacity="0">
    <animate attributeName="opacity" from="0" to="0.7" dur="0.6s" begin="0.3s" fill="freeze" />
  </line>
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.6s" begin="0.6s" fill="freeze" />
    <text x="400" y="130" text-anchor="middle" fill="#9CA3AF" font-family="Inter, system-ui, sans-serif" font-size="15">Instagram content scraper that extracts posts, reels, and profile data using login-based Instagram Private API access with browser-automated authentication and media downloading</text>
  </g>
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.6s" begin="0.8s" fill="freeze" />
    <rect x="183" y="160" width="110" height="20" rx="10" fill="#6366F118" stroke="#6366F1" stroke-width="1" />
    <text x="238" y="174" text-anchor="middle" fill="#6366F1" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="500">social-media</text>
  </g>
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.6s" begin="0.9500000000000001s" fill="freeze" />
    <rect x="301" y="160" width="80" height="20" rx="10" fill="#06B6D418" stroke="#06B6D4" stroke-width="1" />
    <text x="341" y="174" text-anchor="middle" fill="#06B6D4" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="500">scraping</text>
  </g>
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.6s" begin="1.1s" fill="freeze" />
    <rect x="389" y="160" width="132.5" height="20" rx="10" fill="#6366F118" stroke="#6366F1" stroke-width="1" />
    <text x="455.25" y="174" text-anchor="middle" fill="#6366F1" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="500">data-extraction</text>
  </g>
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.6s" begin="1.25s" fill="freeze" />
    <rect x="529.5" y="160" width="87.5" height="20" rx="10" fill="#10B98118" stroke="#10B981" stroke-width="1" />
    <text x="573.25" y="174" text-anchor="middle" fill="#10B981" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="500">instagram</text>
  </g>
